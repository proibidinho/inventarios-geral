# =============================================================================
# PLAYBOOK - Sync 1 servidor LINUX (VMware) novo -> CMDB via Ansible Facts
# Autenticacao: SSH com chave de confianca (sem CyberArk por enquanto).
# =============================================================================
#
# Extra-vars esperados (Job Template AAP):
#   - name              : hostname puro OU "hostname|10.0.0.1,10.0.0.2"
#   - datacenter_target : (opcional) ex.: "Lapa", "Mackenzie", "Ingleses", ...
#
# Pre-requisitos:
#   - JIRA_USER e JIRA_PASSWORD como variaveis de ambiente
#   - Chave SSH de confianca configurada no AAP / target
#
# =============================================================================

- name: "Fase 1 - Descoberta e Validacao de Acesso (Linux)"
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:

    - name: Extrair hostname puro
      ansible.builtin.set_fact:
        hostname_extraido: "{{ name.split('|')[0] | trim }}"

    - name: Extrair IPs validos da string name
      ansible.builtin.set_fact:
        ips_list: "{{ name | regex_findall('\\b\\d{1,3}(?:\\.\\d{1,3}){3}\\b') }}"

    - name: Lista de tentativas (Nome -> IPs)
      ansible.builtin.set_fact:
        lista_tentativas: "{{ [hostname_extraido] + (ips_list | default([])) }}"

    - name: Mostrar lista de tentativas
      ansible.builtin.debug:
        var: lista_tentativas

    # -------------------------------------------------------------------------
    # OPCIONAL - autenticacao via CyberArk (deixado para uso futuro):
    # -------------------------------------------------------------------------
    # - name: Buscar credencial no CyberArk
    #   cyberark.pas.cyberark_credential:
    #     api_base_url: "https://10.88.132.184/"
    #     app_id: "APP_Ansible"
    #     path: "AIMWebService/api/Accounts"
    #     query: "Safe=APP_Ansible;UserName=OPS_CRK_API_AAPLNX"  # TODO: confirmar
    #     validate_certs: false
    #     reason: "Sync CMDB - coleta de facts (Linux)"
    #     connection_timeout: 60
    #   register: cyberark_secret
    #   environment:
    #     http_proxy: ""
    #     https_proxy: ""
    #     no_proxy: "10.88.132.184"
    # -------------------------------------------------------------------------

    - name: Testar conectividade SSH (chave de confianca)
      ansible.builtin.ping:
      vars:
        ansible_host: "{{ item }}"
        ansible_connection: ssh
        ansible_port: 22
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
      loop: "{{ lista_tentativas }}"
      register: ssh_auth_test
      ignore_errors: true
      ignore_unreachable: true
      failed_when: false

    - name: Definir host valido (primeiro que respondeu)
      ansible.builtin.set_fact:
        target_host: >-
          {{
            ssh_auth_test.results
            | rejectattr('failed', 'equalto', true)
            | rejectattr('unreachable', 'equalto', true)
            | map(attribute='item')
            | list
            | first | default('')
          }}

    - name: Interromper se nenhum host respondeu
      ansible.builtin.fail:
        msg: "Nenhum host autenticou via SSH ({{ lista_tentativas }})."
      when: target_host == ''

    - name: Adicionar host valido ao grupo Linux
      ansible.builtin.add_host:
        name: "{{ target_host }}"
        groups: Linux
        ansible_host: "{{ target_host }}"
        ansible_connection: ssh
        ansible_port: 22
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"


# =============================================================================
# Fase 2 - Coletar facts
# =============================================================================
- name: "Fase 2 - Coletar facts"
  hosts: Linux
  gather_facts: true
  any_errors_fatal: true
  tasks:
    - ansible.builtin.debug:
        msg: "Facts OK - {{ ansible_distribution }} {{ ansible_distribution_version }}"


# =============================================================================
# Fase 3 - Criar no CMDB
# =============================================================================
- name: "Fase 3 - Enviar dados ao CMDB"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    target_host: "{{ hostvars['localhost']['target_host'] }}"
  roles:
    - role: integration_assets_facts

# =============================================================================
# vars/modelo_servidor_map_azure.yml
# =============================================================================
# Mapa vm_size (Azure) -> objectKey (GDA-*) do Object Type 406 no CMDB.
# Extraido do dump do CMDB (script acha_atributos.py --list-objects).
#
# Como usar no playbook Azure:
#
#   - name: Transformar hosts Azure
#     ansible.builtin.set_fact:
#       all_cloud_data: "{{ hosts | batch_transform_azure_hosts(modelo_servidor_map) }}"
#
# Quando o time CMDB criar um novo vm_size, basta acrescentar a entrada aqui.
# NAO precisa mexer no filter Python nem no mapeamento_azure_cmdb.yml.
# =============================================================================
---
modelo_servidor_map:
  # === Standard_B (burstable) ===
  Standard_B1s:       GDA-3223950
  Standard_B2s:       GDA-3223955
  Standard_B2ms:      GDA-3223953
  Standard_B2as_v2:   GDA-3223951
  Standard_B4ms:      GDA-3223959
  Standard_B4as_v2:   GDA-3223957

  # === Standard_D (general purpose) ===
  Standard_D2s_v3:    GDA-3223961
  Standard_D4_v2:     GDA-3223967
  Standard_D4s_v3:    GDA-3223965
  Standard_D8s_v3:    GDA-3223969
  Standard_D32as_v4:  GDA-3223963
  Standard_DS3_v2:    GDA-3223971

  # === Standard_E (memory optimized) ===
  Standard_E2as_v4:   GDA-3223973

  # === Standard_F (compute optimized) ===
  Standard_F2s_v2:    GDA-3223977
  Standard_F4s:       GDA-3223979
  Standard_F4s_v2:    GDA-3223980
  Standard_F8s_v2:    GDA-3223982
  Standard_F16s_v2:   GDA-3223975

  # === Categorias genericas ===
  Generic:            GDA-3223981
  VMWare:             GDA-3230997

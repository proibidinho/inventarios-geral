# =============================================================================
# vars/modelo_servidor_map_aws.yml
# =============================================================================
# Mapa instance_type (AWS) -> objectKey (GDA-*) do Object Type 406 no CMDB.
# Extraido do dump do CMDB (script acha_atributos.py --list-objects).
#
# Como usar no playbook AWS:
#
#   - name: Transformar hosts AWS
#     ansible.builtin.set_fact:
#       all_cloud_data: "{{ aap_hosts.json.results | batch_transform_aws_hosts(modelo_servidor_map) }}"
#
# Quando o time CMDB criar um novo instance_type, basta acrescentar a entrada
# aqui. NAO precisa mexer no filter Python nem no mapeamento_aws_cmdb.yml.
# =============================================================================

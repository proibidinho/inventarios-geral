# =============================================================================
# Task: Criar objeto no Jira Assets
# =============================================================================
---
- name: Inicializar lista de IDs de interface de rede
  ansible.builtin.set_fact:
    interface_rede_ids: []

- name: Verificar/Criar Interface de Rede (se necessario)
  ansible.builtin.include_tasks: manage_network_interface.yml
  loop: "{{ current_cloud_data.interface_rede_cloud | default([]) }}"
  loop_control:
    loop_var: ip_info
  when:
  - current_cloud_data.interface_rede_cloud is defined
  - current_cloud_data.interface_rede_cloud | length > 0

- name: Gerar payload base para criacao
  ansible.builtin.set_fact:
    data_create: "{{ current_cloud_data | update_asset_azure(object_attribute_map) }}"

- name: Adicionar Interface de Rede ao payload
  ansible.builtin.set_fact:
    data_create: >-
      {{ data_create | combine({
           'attributes': data_create.attributes + [{
             'objectTypeAttributeId': '3528',
             'objectAttributeValues': interface_rede_ids | map('regex_replace', '^(.*)$', '{"value": "\1"}') | map('from_json') | list
           }]
         })
      }}
  when: interface_rede_ids | length > 0

- name: DEBUG - Payload final de criacao
  ansible.builtin.debug:
    msg: "{{ data_create | to_json }}"

- name: Criar objeto no Assets
  ansible.builtin.uri:
    url: "{{ jira_url }}/object/create"
    method: POST
    force_basic_auth: yes
    headers:
      Content-Type: "application/json"
      Accept: "application/json"
    user: "{{ jira_user }}"
    password: "{{ jira_password }}"
    body: "{{ data_create | to_json }}"
    body_format: json
    return_content: yes
    status_code: [ 200, 201 ]
  register: resultado_create
  environment: "{{ proxy_env | default({}) }}"

- name: Debug - Resultado da criacao
  ansible.builtin.debug:
    msg: "Servidor '{{ current_cloud_data.name_cloud }}' criado com sucesso. ID: {{ resultado_create.json.id | default('N/A') }}"

- name: Registrar criacao no log
  ansible.builtin.set_fact:
    sync_log_create: "{{ sync_log_create | default([]) + [current_cloud_data.name_cloud] }}"
